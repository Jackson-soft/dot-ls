name: CI

on:
  push:
    branches: [main]
    tags: ["*.*.*"]
  pull_request:
    branches: [main]

# Cancel redundant runs on the same branch / PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build & Test (matrix) ────────────────────────────────────────────────────
  build:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            binary: dot-ls
          - os: macos-latest
            platform: darwin-arm64
            binary: dot-ls
          - os: windows-latest
            platform: win-x64
            binary: dot-ls.exe

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install GCC 14 (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-14 g++-14
          echo "CC=gcc-14"  >> $GITHUB_ENV
          echo "CXX=g++-14" >> $GITHUB_ENV

      - name: Install Conan
        shell: bash
        run: |
          pipx install conan
          conan profile detect --force

      - name: Cache Conan packages
        uses: actions/cache@v5
        with:
          path: ~/.conan2/p
          key: conan-${{ matrix.platform }}-${{ hashFiles('conanfile.txt') }}
          restore-keys: conan-${{ matrix.platform }}-

      - name: Install dependencies
        shell: bash
        run: |
          args=(. -s compiler.cppstd=23 -s build_type=Release --build=missing --update)
          conan install "${args[@]}"

      - name: Configure
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            cmake --preset conan-default
          else
            cmake --preset conan-release
          fi

      - name: Build
        run: cmake --build --preset conan-release

      - name: Test
        run: ctest --preset conan-release --output-on-failure

      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist
          cp build/Release/${{ matrix.binary }} dist/
          cd dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "../dot-ls-${{ matrix.platform }}.zip" "${{ matrix.binary }}"
          else
            tar -czf "../dot-ls-${{ matrix.platform }}.tar.gz" "${{ matrix.binary }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: dot-ls-${{ matrix.platform }}
          path: |
            dot-ls-${{ matrix.platform }}.tar.gz
            dot-ls-${{ matrix.platform }}.zip
          overwrite: true

  # ── Release (runs once after all builds pass) ───────────────────────────────
  release:
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/dot-ls-*.tar.gz
            artifacts/dot-ls-*.zip
          generate_release_notes: true

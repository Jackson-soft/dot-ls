name: CI

on:
  push:
    branches: [main]
    tags: ["*.*.*"]
  pull_request:
    branches: [main]

# Cancel redundant runs on the same branch / PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build & Test (matrix) ────────────────────────────────────────────────────
  build:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            cpp_compiler: g++-14
            binary: dot-ls
          - os: macos-latest
            platform: darwin-arm64
            binary: dot-ls
          - os: macos-latest-large
            platform: darwin-x64
            binary: dot-ls
          - os: windows-latest
            platform: win32-x64
            binary: dot-ls.exe

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install Conan
        shell: bash
        run: |
          pipx install conan
          conan profile detect --force

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-${{ matrix.platform }}-${{ hashFiles('conanfile.txt') }}
          restore-keys: conan-${{ matrix.platform }}-

      - name: Install dependencies
        shell: bash
        run: |
          args=(. -s compiler.cppstd=23 -s build_type=Release --build=missing --update)
          if [ "${{ runner.os }}" = "Linux" ]; then
            args+=(-s compiler.version=14)
          fi
          conan install "${args[@]}"

      - name: Configure
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            cmake --preset conan-default
          elif [ "${{ runner.os }}" = "Linux" ]; then
            cmake --preset conan-release -DCMAKE_CXX_COMPILER="${{ matrix.cpp_compiler }}"
          else
            cmake --preset conan-release
          fi

      - name: Build
        run: cmake --build --preset conan-release

      - name: Test
        run: ctest --preset conan-release --output-on-failure

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dot-ls-${{ matrix.platform }}
          path: build/Release/${{ matrix.binary }}
          overwrite: true

  # ── Release (runs once after all builds pass) ───────────────────────────────
  release:
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename binaries for release
        shell: bash
        run: |
          for dir in artifacts/dot-ls-*; do
            platform="${dir#artifacts/dot-ls-}"
            for file in "$dir"/*; do
              base="$(basename "$file")"
              ext=""
              [[ "$base" == *.* ]] && ext=".${base##*.}"
              mv "$file" "artifacts/dot-ls-${platform}${ext}"
            done
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/dot-ls-*
          generate_release_notes: true
